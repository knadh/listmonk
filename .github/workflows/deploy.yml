name: Build and Deploy

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  # 1. TEST GATE: Code must pass logic checks before building
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Run tests
        run: go test ./...

  # 2. BUILD GATE: Image must build successfully before deploying
  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: slug
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate CalVer
        id: calver
        run: |
          VERSION=$(date +'%y.%m.%d').${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.calver.outputs.version }}
          tags: |
            ghcr.io/ollisulopuisto/listmonk:latest
            ghcr.io/ollisulopuisto/listmonk:${{ steps.calver.outputs.version }}
            ghcr.io/ollisulopuisto/listmonk:${{ steps.slug.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git Tag
        if: github.ref == 'refs/heads/master'
        run: |
          git tag v${{ steps.calver.outputs.version }}
          git push origin v${{ steps.calver.outputs.version }}

  # 3. DEPLOY: Only runs if test AND build passed
  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote deploy script (Staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/stacks/scripts/deploy.sh listmonk deploy ${{ steps.calver.outputs.version }}

  deploy-prod:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote deploy script (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/stacks/scripts/deploy.sh listmonk promote
