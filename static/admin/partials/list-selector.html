{{ define "list-selector" -}}
{{- $root := .Root -}}
{{- $model := .Model -}}
{{- $listID := .ListID -}}
<label data-field>
	{{ $root.L.T .Label }}
	<ot-taginput x-model="{{ $model }}">
		<input list="{{ $listID }}" placeholder="{{ $root.L.T .Placeholder }}" @input="listAutocomplete($el)" @pointerdown="listAutocomplete($el)" @focus="listAutocomplete($el)" />
		<datalist id="{{ $listID }}"></datalist>
	</ot-taginput>
	<small data-hint>{{ $root.L.T "subscribers.listsHelp" }}</small>
</label>
{{- end }}
